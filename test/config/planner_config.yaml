###################################################################################
### Param file for tuning the a star planner.                                   ### 
### Want to try different configurations? just specify them as vector, e.g.     ###
### PlannerCommonParam.theta_size: [120, 200]                                   ###
####################################################################################

PlannerCommonParam:
  # Base configs
  - time_limit: 300                   # planning time limit [msec]
  # Search configs
  - theta_size: 120                     # was 120 - discretized angle table size [-]
  - curve_weight: [0.5]                   # curve moving cost [-]
  - reverse_weight: 0.7                 # backward moving cost [-]
  - direction_change_weight: [2.0]        # direction change cost [-]
  - lateral_goal_range: 0.75             # reaching threshold, lateral error [m]
  - longitudinal_goal_range: [1.0]        # reaching threshold, longitudinal error [m]
  - angle_goal_range: [0.5]               # reaching threshold, angle error [deg]
  - max_turning_ratio: [0.7]              # factor of max turning range to use [-]
  - turning_steps: [1]                    # number of turning steps [-]
  # Costmap configs
  - obstacle_threshold: [50]       # obstacle threshold on grid [-]

AstarParam:
  # Base configs
  - search_method: "forward" 
  - only_behind_solutions: false        # solutions should be behind the goal
  - use_back: true                     # If false, reverse motion is disabled entirely (forward-only planning)
  - adapt_expansion_distance: true 
  - expansion_distance: 0.5 
  - near_goal_distance: 3.0 
  # Search configs
  - distance_heuristic_weight: [2.0]      # obstacle threshold on grid [0,255]
  - smoothness_weight: [0.5] # prob 0.7 ... 0.9
  - obstacle_distance_weight: [1.75] 
  - goal_lat_distance_weight: 5.0 
  
PathDistanceCost:
  - use_path_distance_cost: true          # enable reference-path attraction cost layer
  - path_distance_weight: [0.0]           # cost += weight * free-space distance to reference path [m]

# Shape of the vehicle (EDGAR)
VehicleShape:
  # - length: 0.5                       # X [m]
  # - width: [0.5]   
  - length: 4.973                       # X [m]
  - width: 2.2252                       # Y [m]
  - base_length: 3.124 
  - max_steering: [0.70]      # Taken from planning sim
  - base2back: 0.897                    # base_link to rear [m]
  # - base2back: 0.0                    # base_link to rear [m]
