/**:
  ros__parameters:
    # -- Node Configurations --
    waypoints_velocity: 7.0
    update_rate: 10.0
    th_arrived_distance_m: 1.5
    th_stopped_time_sec: 1.0
    th_stopped_velocity_mps: 0.3
    vehicle_shape_margin_m: 0.5
    th_course_out_distance_m: 1.0     # TODO remove
    th_obstacle_time_sec: 1.0         # TODO remove
    replan_when_obstacle_found: true  # TODO remove
    replan_when_course_out: true      # TODO remove
    # multiple goal point search
    goal_distances_along_path_m: [15.0, 20.0, 25.0, 30.0, 35.0]
    extend_path_distance_m: 20.0          # Distance to append reference path for handover while driving

    # -- Common planner config ----------------------------------------
    # base configs
    time_limit: 500.0 # [ms]
    max_turning_ratio: 0.7 # ratio of actual turning limit of vehicle
    turning_steps: 1
    # search configs
    theta_size: 120
    angle_goal_range: 0.5
    lateral_goal_range: 0.75
    longitudinal_goal_range: 1.0
    curve_weight: 0.5
    reverse_weight: 0.7
    direction_change_weight: 2.0
    # costmap configs
    obstacle_threshold: 50
    
    # -- A* search Configurations --
    astar:
      search_method: "forward"  # options: forward, backward
      only_behind_solutions: false
      use_back: false
      adapt_expansion_distance: true
      expansion_distance: 0.5
      near_goal_distance: 3.0
      distance_heuristic_weight: 2.0
      smoothness_weight: 0.5
      obstacle_distance_weight: 1.75
      goal_lat_distance_weight: 5.0
      
